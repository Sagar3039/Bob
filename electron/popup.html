<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bob</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      overflow: visible;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 18px;
      padding-left: 16px;
      padding-right: 16px;
      -webkit-app-region: drag;
      user-select: none;
    }

    .main-row {
      display: flex;
      align-items: center;
      gap: 10px;
      -webkit-app-region: no-drag;
    }

    .search-pill {
      display: flex;
      align-items: center;
      width: 440px;
      height: 54px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 27px;
      border: none;
      box-shadow:
        0 2px 12px rgba(0,0,0,0.08),
        0 0 0 0.5px rgba(0,0,0,0.03),
        inset 0 1px 0 rgba(255,255,255,0.85);
      gap: 0;
      transition: box-shadow 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), background 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      flex-shrink: 0;
    }

    .search-pill:focus-within {
      background: rgba(255, 255, 255, 0.88);
      box-shadow:
        0 4px 20px rgba(0,0,0,0.12),
        0 0 0 0.5px rgba(0,0,0,0.05),
        inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .search-pill .search-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: rgba(0,0,0,0.3);
      margin-right: 12px;
    }

    .search-divider {
      width: 1px;
      height: 22px;
      background: rgba(0,0,0,0.1);
      margin-right: 12px;
      flex-shrink: 0;
    }

    #query {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #1a1a2e;
      font-size: 17px;
      font-weight: 400;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      caret-color: #3478f6;
      height: 100%;
      letter-spacing: -0.01em;
    }

    #query::placeholder {
      color: rgba(0,0,0,0.3);
      font-weight: 400;
    }

    .icon-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.55);
      color: #3c6bb5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
      box-shadow:
        0 1px 4px rgba(0,0,0,0.06),
        inset 0 1px 0 rgba(255,255,255,0.6);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.75);
      transform: scale(1.06);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.1),
        inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .icon-btn:active {
      transform: scale(0.94);
      background: rgba(255, 255, 255, 0.6);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
    }

    .icon-btn.active {
      color: #fff;
      background: #3478f6;
      box-shadow: 0 2px 8px rgba(52,120,246,0.3);
    }

    .icon-btn.active svg {
      color: #fff;
    }

    .icon-btn.active:hover {
      background: #2a6ae0;
      box-shadow: 0 3px 12px rgba(52,120,246,0.4);
    }

    .response-wrapper {
      width: 440px;
      margin-top: 10px;
      -webkit-app-region: no-drag;
    }

    #response-area {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      padding: 0 18px;
      background: rgba(255, 255, 255, 0.78);
      border-radius: 14px;
      border: none;
      box-shadow:
        0 4px 20px rgba(0,0,0,0.1),
        inset 0 1px 0 rgba(255,255,255,0.7);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      font-size: 13px;
      line-height: 1.6;
      color: #2c2c3a;
      white-space: pre-wrap;
      word-wrap: break-word;
      transition: max-height 0.35s cubic-bezier(0.25, 0.1, 0.25, 1), padding 0.35s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
      opacity: 0;
      user-select: text;
    }

    #response-area.visible {
      max-height: 320px;
      padding: 16px 18px;
      opacity: 1;
      overflow-y: auto;
    }

    #response-area::-webkit-scrollbar {
      width: 4px;
    }

    #response-area::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.1);
      border-radius: 4px;
    }

    #response-area .error {
      color: #e74c3c;
    }

    #response-area .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #3478f6;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    #footer {
      display: none;
    }
  </style>
</head>
<body>
  <div class="main-row">
    <div class="search-pill">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="16.5" y1="16.5" x2="21" y2="21"/>
      </svg>
      <div class="search-divider"></div>
      <input id="query" type="text" placeholder="Ask Bob anything..." autofocus />
    </div>
    <div class="icon-buttons">
      <button class="icon-btn" id="voice-toggle" title="Toggle voice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
      <button class="icon-btn" id="tools-btn" title="Tools">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </button>
      <button class="icon-btn" id="memory-btn" title="Memory">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 10 10H12V2z"/>
          <path d="M21.2 8a10 10 0 0 0-8.2-6v8h8.2z" fill="currentColor" opacity="0.3"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="response-wrapper">
    <div id="response-area"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
